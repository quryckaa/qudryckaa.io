<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Zaproszenie na 24. Urodziny Marty</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Alex+Brush&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap');

        :root {
            --bg-color: #f7f5eb;
            --primary-color: #1d35cc;
            --primary-soft: rgba(29, 53, 204, 0.12);
            --text-color: #2b2b2b;
        }

        * { box-sizing: border-box; }

        html { -webkit-text-size-adjust: 100%; }

        body {
            background-color: var(--bg-color);
            color: var(--primary-color);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: clamp(24px, 6vw, 60px) clamp(16px, 5vw, 40px);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
            position: relative;
        }

        /* ---------- SUBTELNY BLUR TŁA ---------- */
        .bg-orbs { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.5;
            animation: drift 18s ease-in-out infinite;
        }
        .orb.a { width: 45vw; height: 45vw; background: rgba(29,53,204,0.28);  top: -10%; left: -8%; }
        .orb.b { width: 40vw; height: 40vw; background: rgba(220,170,90,0.35);  bottom: -12%; right: -6%; animation-delay: -6s; }
        .orb.c { width: 30vw; height: 30vw; background: rgba(29,53,204,0.16);   top: 40%; right: 30%; animation-delay: -11s; }
        @keyframes drift {
            0%,100% { transform: translate(0,0) scale(1); }
            50%     { transform: translate(4%, -5%) scale(1.12); }
        }

        /* ---------- LOADER ---------- */
        #loader {
            position: fixed; inset: 0; z-index: 9999;
            background: var(--bg-color);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 26px;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }
        #loader.hidden { opacity: 0; visibility: hidden; }
        .loader-ring { width: 58px; height: 58px; }
        .loader-ring circle {
            fill: none; stroke: var(--primary-color); stroke-width: 4; stroke-linecap: round;
            stroke-dasharray: 150; stroke-dashoffset: 120;
            transform-origin: center;
            animation: spin 1.1s linear infinite, dash 1.6s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes dash {
            0%   { stroke-dashoffset: 150; }
            50%  { stroke-dashoffset: 40; }
            100% { stroke-dashoffset: 150; }
        }
        .loader-word {
            font-family: 'Alex Brush', cursive;
            font-size: 2.4rem; color: var(--primary-color);
            letter-spacing: 1px;
            animation: pulse 1.6s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }

        /* ---------- KONTENER ---------- */
        .invitation-container {
            max-width: 700px; width: 100%;
            text-align: center; position: relative; z-index: 1;
        }

        /* ---------- TYTUŁ ---------- */
        .main-title {
            font-family: 'Alex Brush', cursive;
            font-size: clamp(4rem, 18vw, 6.8rem);
            line-height: 1;
            margin: 0 0 10px 0;
            font-weight: 400;
            -webkit-font-smoothing: antialiased;
            min-height: 1.05em;
        }
        .main-title .ltr {
            display: inline-block;
            opacity: 0;
            transform: translateY(0.35em) rotate(-6deg);
            animation: letterIn 0.5s cubic-bezier(.2,.8,.2,1) forwards;
        }
        @keyframes letterIn {
            to { opacity: 1; transform: translateY(0) rotate(0); }
        }
        .title-underline {
            width: 0; height: 2px; margin: 4px auto 14px;
            background: var(--primary-color);
            transition: width 1s ease 1.2s;
        }
        .loaded .title-underline { width: clamp(120px, 40vw, 240px); }

        .subtitle {
            font-size: clamp(0.72rem, 2.6vw, 0.9rem);
            text-transform: uppercase;
            letter-spacing: clamp(2px, 1.2vw, 4px);
            margin-bottom: clamp(28px, 7vw, 44px);
            color: var(--text-color);
            font-weight: 400;
        }

        /* ---------- ZDJĘCIE + RAMKA ---------- */
        .photo-frame-container {
            width: clamp(200px, 62vw, 290px);
            aspect-ratio: 280 / 380;
            margin: 0 auto clamp(30px, 8vw, 48px);
            position: relative;
            cursor: pointer;
            z-index: 10;
            transition: transform 0.6s cubic-bezier(.2,.8,.2,1), filter 0.6s ease;
            will-change: transform;
        }
        .photo-frame-container:hover,
        .photo-frame-container:focus-visible { transform: translateY(-8px) scale(1.035) rotate(1deg); outline: none; }
        .photo-frame-container:active { transform: translateY(-2px) scale(1.01); }

        .photo-border {
            position: absolute; inset: 0;
            border-radius: 150px 150px 30px 30px;
            border: 8px solid var(--primary-color);
            box-shadow: 0 22px 45px var(--primary-soft);
            z-index: 3;
            overflow: hidden;
        }
        .photo-border::before {
            content: "";
            position: absolute; top: -60%; left: -30%;
            width: 40%; height: 220%;
            background: linear-gradient(100deg, transparent, rgba(255,255,255,0.85), transparent);
            transform: rotate(18deg);
            animation: sheen 4.5s ease-in-out infinite;
        }
        @keyframes sheen {
            0%   { left: -40%; }
            55%  { left: 130%; }
            100% { left: 130%; }
        }

        .photo-wrapper {
            position: absolute; inset: 8px;
            border-radius: 142px 142px 22px 22px;
            overflow: hidden;
            background: #eadecc;
            z-index: 2;
        }
        .photo-placeholder, .photo-placeholder img {
            width: 100%; height: 100%; display: block;
        }
        .photo-placeholder img {
            object-fit: cover;
            transform: scale(1.02);
            transition: transform 6s ease;
        }
        .photo-frame-container:hover .photo-placeholder img { transform: scale(1.12); }

        .photo-fallback {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            color: var(--primary-color); opacity: 0.55;
        }

        /* ---------- SZCZEGÓŁY ---------- */
        .details-section {
            color: var(--text-color);
            font-size: clamp(0.95rem, 3.2vw, 1.1rem);
            line-height: 1.8;
            max-width: 500px;
            margin: 0 auto clamp(34px, 8vw, 50px);
            font-weight: 300;
        }
        .details-section strong { color: var(--primary-color); font-weight: 600; }
        .details-icons { display: flex; justify-content: center; gap: 22px; margin: 22px 0 4px; }
        .details-icons svg { width: 26px; height: 26px; color: var(--primary-color); }
        .details-icons > span { display:inline-flex; transition: transform .4s ease; }
        .details-icons > span:hover { transform: translateY(-4px) rotate(-6deg); }

        /* ---------- RSVP ---------- */
        .btn-container { display: flex; justify-content: center; gap: clamp(12px, 4vw, 25px); flex-wrap: wrap; }
        .btn {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: clamp(0.72rem, 2.6vw, 0.85rem);
            text-transform: uppercase; letter-spacing: 2px; font-weight: 600;
            padding: clamp(13px, 3.5vw, 16px) clamp(22px, 6vw, 34px);
            border: 1px solid var(--primary-color);
            background: transparent; color: var(--primary-color);
            cursor: pointer; border-radius: 50px;
            display: inline-flex; align-items: center; gap: 9px;
            position: relative; overflow: hidden;
            transition: color .35s ease, transform .25s ease, box-shadow .35s ease;
        }
        .btn svg { width: 17px; height: 17px; position: relative; z-index: 2; }
        .btn span { position: relative; z-index: 2; }
        .btn::before {
            content:""; position:absolute; inset:0;
            background: var(--primary-color);
            transform: scaleX(0); transform-origin: left;
            transition: transform .4s cubic-bezier(.2,.8,.2,1); z-index:1;
        }
        .btn:hover { color: var(--bg-color); transform: translateY(-3px); box-shadow: 0 12px 22px var(--primary-soft); }
        .btn:hover::before { transform: scaleX(1); }
        .btn:active { transform: translateY(-1px) scale(0.98); }

        /* ---------- POLE IMIENIA ---------- */
        .guest-field {
            max-width: 380px; margin: 0 auto 22px;
            display: flex; flex-direction: column; gap: 6px;
            text-align: left;
        }
        .guest-field label {
            font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px;
            color: var(--primary-color); font-weight: 600; padding-left: 4px;
        }
        .name-inputs { display: flex; gap: 10px; }
        .guest-field input {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 1rem; color: var(--text-color);
            padding: 13px 16px; border: 1px solid rgba(29,53,204,0.35);
            border-radius: 14px; background: rgba(255,255,255,0.55);
            transition: border-color .3s ease, box-shadow .3s ease, transform .3s ease;
            width: 100%;
        }
        #guestName { flex: 1 1 auto; }
        #guestInitial { flex: 0 0 72px; text-align: center; text-transform: uppercase; }
        .guest-field input:focus {
            outline: none; border-color: var(--primary-color);
            box-shadow: 0 6px 18px var(--primary-soft); transform: translateY(-2px);
        }
        .guest-field .hint { font-size: 0.72rem; color: #8a887e; padding-left: 4px; min-height: 1em; transition: color .3s ease; }
        .guest-field .hint.error { color: #c23a3a; }

        /* ---------- LISTA GOŚCI W PANELU ---------- */
        .guest-list { margin-top: 10px; max-height: 130px; overflow-y: auto; }
        .guest-list .g-item {
            display: flex; align-items: center; gap: 6px;
            padding: 3px 0; border-top: 1px solid rgba(255,255,255,0.18);
        }
        .guest-list .g-dot { width: 7px; height: 7px; border-radius: 50%; flex: 0 0 auto; }
        .guest-list .g-dot.yes { background: #7cf29a; }
        .guest-list .g-dot.no  { background: #f2a17c; }
        .guest-list .g-empty { opacity: 0.6; font-style: italic; }

        .feedback-msg {
            display: none;
            font-family: 'Alex Brush', cursive;
            font-size: clamp(2.4rem, 9vw, 3.6rem);
            margin-top: 20px;
            animation: fadeIn 0.7s ease forwards;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }

        /* ---------- PANEL ---------- */
        .admin-panel {
            position: fixed; bottom: 15px; right: 15px;
            background: var(--primary-color); color: var(--bg-color);
            padding: 15px 16px; border-radius: 14px;
            font-size: 11px; text-align: left;
            box-shadow: 0 12px 26px rgba(0,0,0,0.18);
            z-index: 1000; border: 1px solid rgba(255,255,255,0.12);
            backdrop-filter: blur(4px);
            transition: transform .4s ease;
        }
        .admin-panel:hover { transform: translateY(-3px); }
        .admin-panel h4 { margin: 0 0 8px; text-transform: uppercase; letter-spacing: 1px; display:flex; align-items:center; gap:6px; }
        .admin-panel h4 svg { width: 14px; height: 14px; }
        .admin-panel button {
            background: var(--bg-color); border: none; color: var(--primary-color);
            padding: 5px 10px; margin-top: 10px; cursor: pointer;
            font-weight: bold; border-radius: 6px; width: 100%; transition: opacity .2s ease;
        }
        .admin-panel button:hover { opacity: .82; }

        /* ---------- WYCISZANIE DŹWIĘKU ---------- */
        .sound-toggle {
            position: fixed; top: 14px; right: 14px; z-index: 1000;
            width: 42px; height: 42px; border-radius: 50%;
            border: 1px solid var(--primary-color); background: rgba(247,245,235,0.75);
            backdrop-filter: blur(6px); color: var(--primary-color);
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            transition: transform .3s ease, background .3s ease;
        }
        .sound-toggle:hover { transform: scale(1.1); }
        .sound-toggle:active { transform: scale(0.94); }
        .sound-toggle svg { width: 20px; height: 20px; }

        /* ---------- SCROLL REVEAL ---------- */
        .reveal { opacity: 0; transform: translateY(30px); transition: opacity .8s ease, transform .8s cubic-bezier(.2,.8,.2,1); }
        .reveal.visible { opacity: 1; transform: translateY(0); }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation: none !important; transition: none !important; }
            .reveal { opacity: 1; transform: none; }
        }

        /* ---------- BREAKPOINTY ---------- */
        @media (max-width: 600px) {
            .photo-border { border-width: 6px; border-radius: 110px 110px 20px 20px; }
            .photo-wrapper { inset: 6px; border-radius: 104px 104px 14px 14px; }
            .admin-panel { display: none; }
            .details-icons { gap: 18px; }
        }
        @media (min-width: 601px) and (max-width: 1024px) {
            .invitation-container { max-width: 620px; }
        }
    </style>
</head>
<body>

        <div>Potwierdzone: <strong id="stat-yes">0</strong></div>
        <div>Odmowy: <strong id="stat-no">0</strong></div>
        <div class="guest-list" id="guestList"></div>
        <button data-sound onclick="resetStats()">Resetuj bazę</button>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        /* ---------- LOADER + START ANIMACJI ---------- */
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loader').classList.add('hidden');
                document.body.classList.add('loaded');
                typeTitle('Marta');
                initReveal();
            }, 1100);
        });

        function typeTitle(word) {
            const el = document.getElementById('mainTitle');
            el.innerHTML = '';
            [...word].forEach((ch, i) => {
                const s = document.createElement('span');
                s.className = 'ltr';
                s.textContent = ch;
                s.style.animationDelay = (0.15 + i * 0.16) + 's';
                el.appendChild(s);
            });
        }

        function initReveal() {
            const els = document.querySelectorAll('.reveal');
            const obs = new IntersectionObserver((entries) => {
                entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); } });
            }, { threshold: 0.15 });
            els.forEach(el => obs.observe(el));
        }

        /* ---------- DŹWIĘK KLIKNIĘCIA ---------- */
        let audioCtx = null, soundOn = true;
        function playClick() {
            if (!soundOn) return;
            try {
                audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const o = audioCtx.createOscillator(), g = audioCtx.createGain();
                o.type = 'triangle';
                o.frequency.setValueAtTime(620, audioCtx.currentTime);
                o.frequency.exponentialRampToValueAtTime(320, audioCtx.currentTime + 0.09);
                g.gain.setValueAtTime(0.0001, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.16, audioCtx.currentTime + 0.01);
                g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.14);
                o.connect(g).connect(audioCtx.destination);
                o.start(); o.stop(audioCtx.currentTime + 0.15);
            } catch(e) {}
        }
        document.addEventListener('click', (e) => { if (e.target.closest('[data-sound]')) playClick(); });

        const soundToggle = document.getElementById('soundToggle');
        soundToggle.addEventListener('click', () => {
            soundOn = !soundOn;
            document.getElementById('iconSoundOn').style.display = soundOn ? 'block' : 'none';
            document.getElementById('iconSoundOff').style.display = soundOn ? 'none' : 'block';
            if (soundOn) playClick();
        });

const firebaseConfig = {
  apiKey: "AIzaSyBY_PJRLYJ3c0DQrhVPBKLmwAbAXMHvlMY",
  authDomain: "zaproszenie-e093b.firebaseapp.com",
  databaseURL: "https://zaproszenie-e093b-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "zaproszenie-e093b",
  storageBucket: "zaproszenie-e093b.firebasestorage.app",
  messagingSenderId: "620895723212",
  appId: "1:620895723212:web:c3f8b065a8c921708dec69",
  measurementId: "G-CYHBJWRSC4"
};

        const firebaseConfig = {
            apiKey: "TWÓJ_KLUCZ",
            authDomain: "TWOJA_DOMENA",
            databaseURL: "TWÓJ_ADRES_DATABASE_URL",
            projectId: "TWÓJ_ID",
            storageBucket: "TWÓJ_BUCKET",
            messagingSenderId: "TWÓJ_SENDER_ID",
            appId: "TWÓJ_APP_ID"
        };
        // ==========================================

        // Inicjalizacja Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let currentYesGlobal = 0;
        let currentNoGlobal = 0;

        // Słuchanie zmian w Firebase (liczniki + lista gości)
        database.ref('urodziny_data').on('value', (snapshot) => {
            const data = snapshot.val() || {};
            currentYesGlobal = data.yes || 0;
            currentNoGlobal = data.no || 0;
            const guestsObj = data.guests || {};

            document.getElementById('stat-yes').innerText = currentYesGlobal;
            document.getElementById('stat-no').innerText = currentNoGlobal;

            // Renderowanie listy w panelu admina
            const listEl = document.getElementById('guestList');
            const guestsArray = Object.values(guestsObj);

            if (!guestsArray.length) {
                listEl.innerHTML = '<div class="g-item g-empty">Brak zgłoszeń</div>';
            } else {
                listEl.innerHTML = guestsArray.map(g =>
                    '<div class="g-item"><span class="g-dot ' + (g.choice === 'yes' ? 'yes' : 'no') + '"></span>' +
                    escapeHtml(g.name) + ' ' + escapeHtml(g.initial) + '.</div>'
                ).join('');
            }
        });

        function escapeHtml(s) {
            return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
        }

        // Sprawdzenie lokalnego statusu użytkownika (czy na TYM urządzeniu już klikano)
        function checkUserStatus() {
            const userChoice = localStorage.getItem('my_firebase_rsvp_choice');
            const rsvpArea = document.getElementById('rsvpArea');
            const feedback = document.getElementById('feedbackMessage');
            const who = localStorage.getItem('my_firebase_rsvp_name') || '';

            if (userChoice === 'yes') {
                rsvpArea.style.display = 'none';
                feedback.innerText = who ? "Super " + who + ", nie mogę się doczekać!" : "Super, nie mogę się doczekać!";
                feedback.style.display = "block";
            } else if (userChoice === 'no') {
                rsvpArea.style.display = 'none';
                feedback.innerText = who ? "Przykro mi, że cię nie będzie, " + who + "..." : "Przykro mi, że cię nie będzie...";
                feedback.style.display = "block";
            } else {
                rsvpArea.style.display = 'block';
                feedback.style.display = 'none';
            }
        }

        function submitResponse(isComing) {
            const nameEl = document.getElementById('guestName');
            const initEl = document.getElementById('guestInitial');
            const hint = document.getElementById('guestHint');
            const name = nameEl.value.trim();
            let initial = initEl.value.trim().toUpperCase();

            // Walidacja pól formularza
            if (!name) {
                hint.textContent = 'Wpisz swoje imię, zanim odpowiesz.';
                hint.classList.add('error');
                nameEl.focus();
                shake(nameEl);
                return;
            }
            if (!/[A-Za-zĄĆĘŁŃÓŚŹŻąćęłńóśźż]/.test(initial)) {
                hint.textContent = 'Dodaj pierwszą literę nazwiska.';
                hint.classList.add('error');
                initEl.focus();
                shake(initEl);
                return;
            }
            initial = initial.charAt(0);
            hint.classList.remove('error');

            const localId = localStorage.getItem('my_firebase_guest_id') || 'guest_' + Math.random().toString(36).substr(2, 9);
            const previousChoice = localStorage.getItem('my_firebase_rsvp_choice');
            const newChoice = isComing ? 'yes' : 'no';

            if (previousChoice === newChoice) return;

            let updatedYes = currentYesGlobal;
            let updatedNo = currentNoGlobal;

            // Korygowanie globalnego licznika, jeśli użytkownik zmienia zdanie
            if (previousChoice === 'yes') updatedYes = Math.max(0, updatedYes - 1);
            if (previousChoice === 'no') updatedNo = Math.max(0, updatedNo - 1);

            if (newChoice === 'yes') updatedYes++;
            if (newChoice === 'no') updatedNo++;

            // Pakiet danych do jednoczesnej aktualizacji Firebase
            const updates = {};
            updates['/urodziny_data/yes'] = updatedYes;
            updates['/urodziny_data/no'] = updatedNo;
            updates['/urodziny_data/guests/' + localId] = {
                name: name,
                initial: initial,
                choice: newChoice
            };

            database.ref().update(updates).then(() => {
                localStorage.setItem('my_firebase_guest_id', localId);
                localStorage.setItem('my_firebase_rsvp_choice', newChoice);
                localStorage.setItem('my_firebase_rsvp_name', name + ' ' + initial + '.');
                checkUserStatus();
            }).catch(err => console.error("Błąd zapisu Firebase:", err));
        }

        function shake(el) {
            el.animate([
                { transform: 'translateX(0)' }, { transform: 'translateX(-6px)' },
                { transform: 'translateX(6px)' }, { transform: 'translateX(-4px)' },
                { transform: 'translateX(0)' }
            ], { duration: 320, easing: 'ease-in-out' });
        }

        function resetStats() {
            if (confirm("Czy na pewno chcesz wyzerować całą globalną bazę danych Firebase?")) {
                database.ref('urodziny_data').set({ yes: 0, no: 0, guests: {} });
                localStorage.removeItem('my_firebase_guest_id');
                localStorage.removeItem('my_firebase_rsvp_choice');
                localStorage.removeItem('my_firebase_rsvp_name');
                const hint = document.getElementById('guestHint');
                if (hint) { hint.textContent = 'Podaj imię i pierwszą literę nazwiska, np. Marta K.'; hint.classList.remove('error'); }
                checkUserStatus();
            }
        }

        // Pierwsze uruchomienie weryfikacji urządzenia
        checkUserStatus();
    </script>
</body>
</html>
