<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zaproszenie na 24 Urodziny Marty</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Alex+Brush&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap');

        :root {
            --bg-color: #f7f5eb;      /* Kremowe tło */
            --primary-color: #1d35cc; /* Głęboki kobaltowy niebieski */
            --text-color: #2b2b2b;
        }

        body {
            background-color: var(--bg-color);
            color: var(--primary-color);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .invitation-container {
            max-width: 700px;
            width: 100%;
            text-align: center;
            position: relative;
        }

        .main-title {
            font-family: 'Alex Brush', cursive;
            font-size: 6.5rem;
            line-height: 1;
            margin: 0 0 10px 0;
            font-weight: 400;
            word-spacing: -10px;
            -webkit-font-smoothing: antialiased;
        }

        .subtitle {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 40px;
            color: var(--text-color);
            font-weight: 400;
        }

        .photo-frame-container {
            width: 280px;
            height: 380px;
            margin: 0 auto 40px auto;
            position: relative;
            transition: transform 0.5s ease, box-shadow 0.5s ease;
            cursor: pointer;
            z-index: 10;
        }

        .photo-frame-container:hover {
            transform: scale(1.03) rotate(1deg);
            box-shadow: 0 25px 50px rgba(29, 53, 204, 0.2);
        }

        .photo-border {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 150px 150px 30px 30px;
            border: 8px solid var(--primary-color);
            box-sizing: border-box;
            box-shadow: 0 20px 40px rgba(29, 53, 204, 0.12);
            z-index: 1;
        }

        .photo-wrapper {
            position: absolute;
            top: 8px;
            left: 8px;
            right: 8px;
            bottom: 8px;
            border-radius: 142px 142px 22px 22px;
            overflow: hidden;
            background: #eadecc;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }

        .photo-placeholder {
            width: 100%;
            height: 100%;
        }

        .photo-placeholder img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .details-section {
            color: var(--text-color);
            font-size: 1.1rem;
            line-height: 1.8;
            max-width: 500px;
            margin: 0 auto 50px auto;
            font-weight: 300;
            text-align: center;
        }

        .details-section strong {
            color: var(--primary-color);
            font-weight: 600;
        }

        .rsvp-section {
            margin-top: 30px;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
        }

        .btn {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            padding: 16px 32px;
            border: 1px solid var(--primary-color);
            background: transparent;
            color: var(--primary-color);
            cursor: pointer;
            border-radius: 50px;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: var(--primary-color);
            color: var(--bg-color);
            transform: translateY(-2px);
        }

        .feedback-msg {
            display: none;
            font-family: 'Alex Brush', cursive;
            font-size: 3.5rem;
            margin-top: 20px;
            animation: fadeIn 0.6s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .admin-panel {
            position: fixed;
            bottom: 15px;
            right: 15px;
            background: var(--primary-color);
            color: var(--bg-color);
            padding: 15px;
            border-radius: 12px;
            font-size: 11px;
            text-align: left;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            z-index: 1000;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .admin-panel h4 { margin: 0 0 8px 0; text-transform: uppercase; letter-spacing: 1px; }
        .admin-panel button { 
            background: var(--bg-color); border: none; color: var(--primary-color);
            padding: 4px 10px; margin-top: 10px; cursor: pointer; 
            font-weight: bold; border-radius: 4px; width: 100%;
        }

        @media (max-width: 600px) {
            body { padding: 20px 15px; }
            .main-title { font-size: 4rem; word-spacing: -5px; }
            .subtitle { font-size: 0.8rem; letter-spacing: 2px; margin-bottom: 30px; }
            .photo-frame-container { width: 200px; height: 270px; margin-bottom: 30px; }
            .photo-border { border-width: 6px; border-radius: 100px 100px 20px 20px; }
            .photo-wrapper { top: 6px; left: 6px; right: 6px; bottom: 6px; border-radius: 94px 94px 14px 14px; }
            .details-section { font-size: 0.95rem; line-height: 1.6; }
            .btn-container { gap: 15px; }
            .btn { font-size: 0.75rem; padding: 12px 24px; letter-spacing: 1px; }
            .feedback-msg { font-size: 2.5rem; }
            .admin-panel { display: none; }
        }
    </style>
</head>
<body>

    <div class="invitation-container">
        <h1 class="main-title">Marta</h1>
        <div class="subtitle">Zaproszenie na 24. Urodziny</div>

        <div class="photo-frame-container">
            <div class="photo-border"></div> 
            <div class="photo-wrapper">
                <div class="photo-placeholder">
                    <img src="uromore.jpg" alt="Marta">
                </div>
            </div>
        </div>

        <div class="details-section">
            Proszę się przygotować na granie, oglądanie i&nbsp;drinkowanie!<br>
            Spotykamy się w&nbsp;dniach <strong>18 – 19 lipca 2026 r.</strong><br>
            Godziny przybycia: <strong> 15:00 - 16:00</strong>
        </div>

        <div class="rsvp-section" id="rsvpArea">
            <div class="btn-container">
                <button class="btn" onclick="submitResponse(true)">Jasne, że będę</button>
                <button class="btn" onclick="submitResponse(false)">Niestety nie dam rady</button>
            </div>
        </div>

        <div class="feedback-msg" id="feedbackMessage"></div>
    </div>

    <div class="admin-panel">
        <h4>📊 RSVP Status</h4>
        <div>Potwierdzone: <strong id="stat-yes">0</strong></div>
        <div>Odmowy: <strong id="stat-no">0</strong></div>
        <button onclick="resetStats()">Resetuj bazę</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "...",
  databaseURL: "https://console.firebase.google.com/u/0/project/zaproszenie-e093b/database/zaproszenie-e093b-default-rtdb/data/~2F", 
  projectId: "...",
  storageBucket: "...",
  messagingSenderId: "...",
  appId: "..."
};
        const firebaseConfig = {
            apiKey: "TWÓJ_KLUCZ",
            authDomain: "TWOJA_DOMENA",
            databaseURL: "TWÓJ_ADRES_DATABASE_URL",
            projectId: "TWÓJ_ID",
            storageBucket: "TWÓJ_BUCKET",
            messagingSenderId: "TWÓJ_SENDER_ID",
            appId: "TWÓJ_APP_ID"
        };
        // ==========================================

        // Inicjalizacja Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Zmienne pomocnicze dla lokalnego stanu urządzenia
        let currentYesGlobal = 0;
        let currentNoGlobal = 0;

        // Słuchacz bazy danych – aktualizuje panel na żywo u wszystkich!
        database.ref('rsvp').on('value', (snapshot) => {
            const data = snapshot.val() || { yes: 0, no: 0 };
            currentYesGlobal = data.yes || 0;
            currentNoGlobal = data.no || 0;
            
            document.getElementById('stat-yes').innerText = currentYesGlobal;
            document.getElementById('stat-no').innerText = currentNoGlobal;
        });

        // Sprawdzenie, czy ten konkretny użytkownik już coś wcześniej kliknął
        function checkUserLocalStatus() {
            const myChoice = localStorage.getItem('my_cloud_rsvp_choice');
            const rsvpArea = document.getElementById('rsvpArea');
            const feedback = document.getElementById('feedbackMessage');

            if (myChoice === 'yes') {
                rsvpArea.style.display = 'none';
                feedback.innerText = "Super, nie mogę się doczekać!";
                feedback.style.display = "block";
            } else if (myChoice === 'no') {
                rsvpArea.style.display = 'none';
                feedback.innerText = "Przykro mi, że cię nie będzie...";
                feedback.style.display = "block";
            } else {
                rsvpArea.style.display = 'block';
                feedback.style.display = 'none';
            }
        }

        function submitResponse(isComing) {
            const localChoice = localStorage.getItem('my_cloud_rsvp_choice');
            const newChoice = isComing ? 'yes' : 'no';

            if (localChoice === newChoice) return; // Kliknięto to samo

            let updatedYes = currentYesGlobal;
            let updatedNo = currentNoGlobal;

            // Jeśli użytkownik zmienia zdanie, odejmujemy stary głos z chmury
            if (localChoice === 'yes') updatedYes = Math.max(0, updatedYes - 1);
            if (localChoice === 'no') updatedNo = Math.max(0, updatedNo - 1);

            // Dodajemy nowy głos do chmury
            if (newChoice === 'yes') updatedYes++;
            if (newChoice === 'no') updatedNo++;

            // Zapis w bazie Firebase
            database.ref('rsvp').set({
                yes: updatedYes,
                no: updatedNo
            }).then(() => {
                // Zapis w pamięci lokalnej urządzenia, żeby ukryć przyciski
                localStorage.setItem('my_cloud_rsvp_choice', newChoice);
                checkUserLocalStatus();
            }).catch(err => console.error("Błąd zapisu w bazie danych:", err));
        }

        function resetStats() {
            if(confirm("Czy na pewno chcesz wyzerować całą globalną bazę danych?")) {
                database.ref('rsvp').set({ yes: 0, no: 0 });
                localStorage.removeItem('my_cloud_rsvp_choice');
                checkUserLocalStatus();
            }
        }

        // Uruchomienie sprawdzenia lokalnego przy ładowaniu strony
        checkUserLocalStatus();
    </script>
</body>
</html>
</html>
